# Ruff config for the tracker. Conservative on purpose: catch real problems
# (undefined names, unused imports, bad comparisons) and keep imports tidy,
# without imposing churny stylistic rewrites on a working, hand-tuned codebase.
line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (undefined names, unused imports)
    "W",   # pycodestyle warnings
    "I",   # import sorting
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
# E501 (line too long) is enforced via the formatter/line-length, not the
# linter, to avoid noise on long string literals like the AI prompts.
ignore = ["E501"]

[lint.per-file-ignores]
# Tests intentionally poke at private helpers (matching._norm) and unused args.
"tests/*" = ["B018"]
